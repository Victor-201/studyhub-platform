name: keep-warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/keep-warm.yml"

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Warm gateway (cold start up to 120s)
        run: |
          url="https://sh-api-gateway.onrender.com/health"
          echo "Warming $url ..."
          for i in $(seq 1 20); do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$url" 2>/dev/null)
            echo "  attempt $i: $code"
            [ "$code" = "200" ] && echo "OK" && break
            sleep 6
          done

      - name: Ping all backend services
        run: |
          for url in \
            https://sh-auth-service.onrender.com/health \
            https://sh-document-service.onrender.com/health \
            https://sh-user-service.onrender.com/health \
            https://sh-group-service.onrender.com/health \
            https://sh-chat-service.onrender.com/health \
            https://sh-notification-service.onrender.com/health
          do
            echo "Pinging $url ..."
            for i in 1 2 3; do
              code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "$url")
              [ "$code" = "200" ] && echo "  OK" && break
              echo "  attempt $i: $code, sleeping 15s..."
              sleep 15
            done
          done