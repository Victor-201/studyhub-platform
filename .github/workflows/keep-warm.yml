name: keep-warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - ".github/workflows/keep-warm.yml"

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Ping all services
        run: |
          set +e
          PIDS=""
          for url in \
            https://sh-api-gateway.onrender.com/health \
            https://sh-auth-service.onrender.com/health \
            https://sh-document-service.onrender.com/health \
            https://sh-user-service.onrender.com/health \
            https://sh-group-service.onrender.com/health \
            https://sh-chat-service.onrender.com/health \
            https://sh-notification-service.onrender.com/health
          do
            (curl -s -o /dev/null -w "%{http_code}" --max-time 90 "$url" && echo " $url OK") &
            PIDS="$PIDS $!"
          done
          echo "Waiting for all services..."
          for pid in $PIDS; do wait $pid 2>/dev/null; done
          echo "Done"