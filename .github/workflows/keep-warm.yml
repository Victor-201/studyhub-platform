name: keep-warm

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -s --max-time 30 "https://sh-api-gateway.onrender.com/health" > /dev/null
          curl -s --max-time 30 "https://sh-auth-service.onrender.com/health" > /dev/null
          curl -s --max-time 30 "https://sh-document-service.onrender.com/health" > /dev/null
          curl -s --max-time 30 "https://sh-user-service.onrender.com/health" > /dev/null
          curl -s --max-time 30 "https://sh-group-service.onrender.com/health" > /dev/null
          curl -s --max-time 30 "https://sh-chat-service.onrender.com/health" > /dev/null
          curl -s --max-time 30 "https://sh-notification-service.onrender.com/health" > /dev/null